<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Ink-dark rounded background -->
  <rect width="512" height="512" rx="108" fill="#14171C"/>

  <!-- Outer ring (porcelain) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#EDEEF0" stroke-width="24"/>

  <!-- Inner filled circle (porcelain) -->
  <circle cx="256" cy="256" r="142" fill="#EDEEF0"/>

  <!-- Notch — chops out the bottom-right of the inner circle to form the glyph -->
  <rect x="244" y="278" width="156" height="120" fill="#14171C"/>

  <!-- Cobalt accent dot at the inside corner -->
  <circle cx="244" cy="278" r="20" fill="#2540FF"/>
</svg>
