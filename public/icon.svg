<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Left card -->
  <rect x="80" y="100" width="220" height="320" rx="16" fill="white" opacity="0.2"/>

  <!-- Right card -->
  <rect x="180" y="70" width="240" height="320" rx="16" fill="white" opacity="0.35"/>

  <!-- RF text -->
  <text x="256" y="300" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="180" fill="white" text-anchor="middle">RF</text>
</svg>
