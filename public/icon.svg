    <!-- Header line -->
    <rect x="44" y="40" width="140" height="14" rx="7" fill="#6366f1" opacity="0.7"/>
    <!-- Subtitle -->
    <rect x="44" y="68" width="100" height="8" rx="4" fill="#a5b4fc" opacity="0.5"/>
    <!-- Divider -->
    <rect x="44" y="96" width="212" height="2" rx="1" fill="#c7d2fe" opacity="0.6"/>
    <!-- Section header -->
    <rect x="44" y="116" width="80" height="10" rx="5" fill="#6366f1" opacity="0.5"/>
    <!-- Content lines -->
    <rect x="44" y="142" width="212" height="8" rx="4" fill="#94a3b8" opacity="0.4"/>
    <rect x="44" y="160" width="190" height="8" rx="4" fill="#94a3b8" opacity="0.35"/>
    <rect x="44" y="178" width="200" height="8" rx="4" fill="#94a3b8" opacity="0.3"/>
    <!-- Section header 2 -->
    <rect x="44" y="210" width="70" height="10" rx="5" fill="#6366f1" opacity="0.5"/>
    <!-- Content lines 2 -->
    <rect x="44" y="236" width="212" height="8" rx="4" fill="#94a3b8" opacity="0.4"/>
    <rect x="44" y="254" width="180" height="8" rx="4" fill="#94a3b8" opacity="0.35"/>
    <rect x="44" y="272" width="195" height="8" rx="4" fill="#94a3b8" opacity="0.3"/>
    <!-- Skill tags -->
    <rect x="44" y="304" width="50" height="20" rx="10" fill="#6366f1" opacity="0.2"/>
    <rect x="102" y="304" width="60" height="20" rx="10" fill="#6366f1" opacity="0.2"/>
    <rect x="170" y="304" width="45" height="20" rx="10" fill="#6366f1" opacity="0.2"/>
    <rect x="44" y="332" width="55" height="20" rx="10" fill="#6366f1" opacity="0.2"/>
    <rect x="107" y="332" width="48" height="20" rx="10" fill="#6366f1" opacity="0.2"/>
  </g>

  <!-- AI Sparkle -->
  <g transform="translate(340, 310)">
    <circle cx="60" cy="60" r="72" fill="#facc15" opacity="0.15"/>
    <circle cx="60" cy="60" r="52" fill="#facc15" opacity="0.1"/>
    <path d="M60 8 L70 45 L108 55 L70 65 L60 108 L50 65 L12 55 L50 45 Z" fill="url(#sparkle)"/>
    <circle cx="100" cy="20" r="5" fill="#fde68a"/>
    <circle cx="18" cy="95" r="4" fill="#fde68a"/>
    <circle cx="95" cy="98" r="3.5" fill="#fde68a" opacity="0.8"/>
